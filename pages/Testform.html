
<form id="orderForm">
  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required>
  
  <label for="email">E-Mail:</label>
  <input type="email" id="email" name="email" required>
  
  <label for="orderDetails">Bestelldetails:</label>
  <textarea id="orderDetails" name="orderDetails" required></textarea>
  
  <button type="submit">Bestellung abschicken</button>
</form>

<script>
  document.getElementById('orderForm').addEventListener('submit', async function (event) {
    event.preventDefault();
    
    const formData = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      orderDetails: document.getElementById('orderDetails').value,
    };
    
    const response = await fetch('/api/sendOrder', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(formData),
    });
    
    if (response.ok) {
      alert('Bestellbestätigung wurde gesendet!');
    } else {
      alert('Fehler beim Senden der Bestellung.');
    }
  });
</script>
